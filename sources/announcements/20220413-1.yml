announcement:
  title:
    ru: Заявление МИД России об ответных персональных санкциях в отношении конгрессменов США
    en: Foreign Ministry statement regarding response personal sanctions against members of the US Congress
  url: https://mid.ru/ru/foreign_policy/news/1809216/
  lang: ru
  publish_date: '2022-04-13'
  publish_time: '21:01'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 806-13-04-2022
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В порядке реакции на очередную «волну» антироссийских санкций, введенных Администрацией Дж.Байдена 24 марта с.г. против 328 депутатов Государственной Думы Федерального Собрания Российской Федерации, что с учетом прежде внесенных в «черный список» российских парламентариев составляет практически весь ее состав, вводятся «зеркальные» санкционные ограничения в отношении 398 членов Палаты представителей Конгресса США.

      Указанные лица, включая руководство и председателей комитетов нижней палаты американского Конгресса, вносятся в российский «стоп-лист» на постоянной основе. Вместе с другими действующими законодателями, кому, как Спикеру Н.Пелоси, въезд в Российскую Федерацию был закрыт ранее, «листированию» на основе взаимности подвергнуты все конгрессмены США.

      <list>
    en: |
      In response to the latest wave of anti-Russia sanctions imposed by the Biden Administration on March 24, 2022, against 328 deputies of the State Duma of the Federal Assembly of the Russian Federation, or nearly all members of the lower house taken together with the other previously blacklisted members, Russia has adopted response sanction restrictions against 398 members of the House of Representatives of the US Congress.

      These persons, including the leaders and committee chairs of the lower house of the US Congress, have been permanently put on the Russian stop list. All members of the US Congress have been blacklisted together with the other incumbent legislators, who have been prohibited from entering the Russian Federation alongside Speaker Nancy Pelosi.

