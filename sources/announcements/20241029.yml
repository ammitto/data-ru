announcement:
  title:
    ru: Заявление МИД России о персональных санкциях в отношении антироссийски настроенных граждан Австралии
    en: Foreign Ministry statement regarding personal sanctions against citizens of Australian holding anti-Russia views
  url: https://mid.ru/en/foreign_policy/news/1978052/
  lang: ru
  publish_date: '2024-10-29'
  publish_time: '17:37'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 2019-29-10-2024
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на политически мотивированные санкции против российских физических и юридических лиц со стороны правительства Австралии, вводимые в рамках русофобской кампании «коллективного Запада», въезд в Российскую Федерацию на бессрочной основе закрывается дополнительно для 131 австралийца из числа представителей военно-промышленного комплекса, журналистов и общественных деятелей, формирующих в этой стране антироссийскую повестку дня.

      С учетом того, что официальная Канберра не намерена отказываться от антироссийского курса и продолжает вводить новые санкционные меры, работа над актуализацией российского «стоп-листа» будет продолжена.

      <list>
    en: |
      Guided by a politically tainted agenda, the government of Australia has been imposing sanctions against Russian individuals and entities as part of the Russia-hating campaign unleashed by the so-called collective West. In response, the Russian Federation decided to add 131 Australian nationals to the permanent stop list and therefore make it impossible for them to enter its territory. These individuals include representatives of defence manufacturers, journalists, as well as civil society activists who have contributed to shaping the anti-Russia agenda in this country.

      The effort to update the Russian stop list will carry on, considering Canberra’s persistence in following an anti-Russia policy and imposing new sanctions against our country.
