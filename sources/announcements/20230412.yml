announcement:
  title:
    ru: Заявление МИД России о введении персональных санкций в отношении ряда граждан Канады
    en: Foreign Ministry statement on personal sanctions against Canadian citizens
  url: https://www.mid.ru/en/foreign_policy/news/1863094/
  lang: ru
  publish_date: '2023-04-12'
  publish_time: '15:55'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 684-12-04-2023
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      Ввиду антироссийских санкций, периодически вводимых режимом Дж.Трюдо против официальных лиц, политиков, экспертов, журналистов, деятелей культуры и спортсменов из России, а также всех, кто не устраивает оттавский «мейнстрим» и поддерживаемые им неонацистские власти в Киеве, въезд в Российскую Федерацию закрывается на постоянной основе для 333 граждан Канады.

      Придерживаясь принципа неотвратимости наказания, российская сторона в ответ на враждебные действия Оттавы внесла в «стоп-лист» представителей канадского руководства, парламентариев и политиков различного уровня, общественных активистов и атлетов, причастных к распространению в стране оголтелой русофобии. Эта мера призвана также побудить попавших в «черный список» изменить свое поведение.

      <list>
    en: |
      In connection with the anti-Russia sanctions periodically imposed by the Justin Trudeau regime against Russian officials, politicians, experts, journalists, cultural figures and athletes, as well as others who are dissatisfied with Ottawa’s mainstream system and the neo-Nazi regime in Kiev it supports, Russia has adopted restrictions against 333 citizens of Canada who are now permanently banned from entering the Russian Federation.

      In accordance with the principle of the unavoidability of punishment and in response to Ottawa’s hostile actions, Russia has added Canadian top officials, members of parliament, politicians, public activists and athletes who contributed to the proliferation of flagrant Russophobia in the country to the stop-list. This measure is also aimed at encouraging these persons to rethink their behaviour.

      Canadian citizens added to 'List 333' include the following:

      <list>
