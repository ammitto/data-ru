---
announcement:
  title:
    ru: Заявление МИД России о персональных санкциях в отношении представителей высшего руководства и парламентариев Австралии
    en: Foreign Ministry statement on personal sanctions on senior officials and MPs of Australia
  url: https://mid.ru/ru/foreign_policy/news/1808465/?lang=en
  lang: ru
  publish_date: '2022-04-07'
  publish_time: '18:54'
  authority: Министерство иностранных дел Российской Федерации
  publisher: Министерство иностранных дел Российской Федерации
  type: press-release
  document_id: 755-07-04-2022
  signatory: Министерство иностранных дел Российской Федерации
  content:
    ru: |
      Послушно следуя курсом «коллективного Запада», Канберра в безоглядном русофобском запале ввела санкции, которые затронули высших руководителей Российской Федерации и практически весь депутатский корпус. В ответ с 7 апреля с.г. в «стоп-лист» лиц, которым закрыт въезд в Россию, включаются члены австралийского комитета по национальной безопасности, палаты представителей, сената и региональных законодательных собраний.

      Данный шаг предпринят в порядке реакции на недружественные действия нынешнего австралийского правительства, готового поддерживать любые действия, нацеленные на сдерживание России.

      В ближайшее время последуют новые объявления о расширении санкционного «черного списка» за счет включения в него австралийских военных, бизнесменов, экспертов и медийных персон, которые способствуют разжиганию негативного отношения к нашей стране. Каждый антироссийский шаг – от введения новых персональных санкций до ограничения двусторонних экономических отношений, что наносит ущерб интересам самих австралийцев – получит решительный отпор.

      Ниже следует список граждан Австралии, которые отныне являются невъездными в Российскую Федерацию.
    en: |
      Obediently following the policy set by the collective West, Canberra has fallen into a Russophobic frenzy and introduced sanctions against Russia’s senior leadership and practically all members of parliament. In response, on April 7, 2022, Russia added to its stop list members of the Australian National Security Committee, House of Representatives, Senate and regional legislative assemblies. They are denied entry into the Russian Federation.

      This step comes in response to the unfriendly actions by the current Australian Government, which is prepared to support any actions aimed at containing Russia.

      Subsequent announcements will expand the sanctions blacklist to include Australian military, entrepreneurs, experts and media figures who contribute to negative perceptions of our country. We will resolutely oppose every anti-Russia action – from the introduction of new personal sanctions to restrictions on bilateral economic ties, which is doing damage to bilateral economic relations.

