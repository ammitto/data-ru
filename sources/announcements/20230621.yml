announcement:
  title:
    ru: Заявление МИД России в связи с введением персональных санкций в отношении граждан Австралии
    en: Foreign Ministry statement on the introduction of personal sanctions against Australian citizens
  url: https://www.mid.ru/ru/foreign_policy/news/1890258/
  lang: ru
  publish_date: '2023-06-21'
  publish_time: '18:24'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 1217-21-06-2023
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на политически мотивированные санкции против российских физических и юридических лиц со стороны правительства Австралии, вводимые в рамках русофобской кампании «коллективного Запада», въезд в нашу страну на бессрочной основе закрывается дополнительно для 48 австралийцев из числа подрядчиков военно-промышленного комплекса, журналистов и муниципальных депутатов, формирующих в этой стране антироссийскую повестку дня.

      <list>
    en: |
      In response to the politically motivated sanctions against Russian individuals and legal entities introduced by the Australian government as part of the Russophobic campaign by the collective West, entry to Russia is closed indefinitely for additional 48 Australians from among contractors of the military-industrial complex, journalists and municipal deputies who are creating the anti-Russian agenda in that country. Their names are as follows:

      <list>
