announcement:
  title:
    ru: Заявление МИД России в связи с введением персональных санкций в отношении граждан США
    en: Foreign Ministry statement on personal sanctions against US citizens
  url: https://mid.ru/ru/maps/us/1828611/
  lang: ru
  publish_date: '2022-09-05'
  publish_time: '14:50'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 1789-05-09-2022
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В порядке ответных мер на постоянно расширяемые Администрацией Дж.Байдена персональные санкции против граждан России, в отношении очередной группы лиц из числа членов Конгресса США, высокопоставленных чиновников, представителей делового и экспертного сообществ, а также деятелей культуры (25 чел.), вводится запрет на въезд в Российскую Федерацию на постоянной основе.

      <list>
    en: |
      In response to the constantly expanding list of personal sanctions against Russian nationals imposed by the Biden administration, Russia has adopted restrictions against members of the US Congress, high-ranking officials, representatives of business and expert circles, as well as cultural workers (25 people total), who are now permanently banned from entering the Russian Federation.

      US nationals added to the Russian stop-list as a response measure now include the following:


      Matthew S. Axelrod

      –

      <list>
