# yaml-language-server: $schema=../../schemas/announcement-schema.yml
---
announcement:
  title:
    ru: >-
      Заявление МИД России о персональных санкциях в отношении представителей силовых структур, пограничной службы и компаний-подрядчиков
      оборонного сектора Австралии
    en: >-
      Foreign Ministry statement on introducing personal sanctions on representatives of Australia’s law enforcement agencies,
      border force and defence sector contractors
  url: https://mid.ru/en/maps/au/1823204/
  lang: ru
  publish_date: '2022-07-21'
  publish_time: '19:17'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 1514-21-07-2022
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В порядке ответа на принятое ранее решение официальной Канберры о введении санкций по австралийскому аналогу «Закона Магнитского» Российская Федерация на основе взаимности дополнительно вносит в национальный «стоп-лист» 39 человек из числа представителей силовых структур, пограничной службы, а также компаний-подрядчиков оборонного сектора Австралии.

      <list>
    en: |
      In response to the official Canberra’s adoption of sanctions in line with the Australian version of the Magnitsky Act, the Russian Federation has added 39 people from law enforcement agencies, the border force and Australia’s defence sector contractors to the national stop list.

      The names of the blacklisted people are as follows:



      No

      Name, Surname

      Name, Surname in Russian

      Office/position

      <list>
