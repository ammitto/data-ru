announcement:
  title:
    ru: Заявление МИД России в связи с введением персональных санкций в отношении граждан США
    en: Foreign Ministry statement on the introduction of personal sanctions against US citizens
  url: https://mid.ru/ru/foreign_policy/news/1838239/
  lang: ru
  publish_date: '2022-11-11'
  publish_time: '19:26'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 2321-11-11-2022
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на постоянно вводимые Администрацией Дж.Байдена все новые персональные санкции не только против российских официальных лиц, представителей деловых кругов и общественности, деятелей культуры, но и тех, кто по тем или иным причинам неугоден Вашингтону, на основе взаимности вводится запрет на въезд в Российскую Федерацию в отношении 200 граждан США. В их числе – отдельные представители органов власти и законодатели, а также их близкие родственники, руководители компаний и предприятий ВПК, эксперты и лоббисты, вовлеченные в раскрутку русофобской кампании и поддержку режима в Киеве.

      Ниже следует пофамильный перечень «списка-200», фигуранты которого вносятся в российский «стоп-лист» на постоянной основе.

      <list>
    en: |
      In response to the personal sanctions that the Biden administration constantly imposes on Russian officials, representatives of the business community and the public at large, cultural figures and those whom Washington dislikes for various reasons, it has been decided to ban the entry of 200 US citizens into the Russian Federation on a reciprocal basis. The list includes certain government officials and lawmakers, as well as their family members, heads of defence industry companies and enterprises, experts and lobbyists involved in ratcheting up the anti-Russia campaign and supporting the regime in Kiev.

      Below is a list of 200 persons who shall be included in the Russian stop-list on a permanent basis.

