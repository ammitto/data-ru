# yaml-language-server: $schema=../../schemas/announcement-schema.yml
---
announcement:
  title:
    ru: Заявление МИД России об ответных персональных санкциях в отношении депутатов Палаты общин Парламента Великобритании
    en: Заявление МИД России об ответных персональных санкциях в отношении депутатов Палаты общин Парламента Великобритании
  url: https://mid.ru/ru/foreign_policy/news/1810980/
  lang: ru
  publish_date: '2022-04-27'
  publish_time: '13:06'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 918-27-04-2022
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на принятое 11 марта с.г. правительством Великобритании решение о внесении в санкционный список 386 депутатов Государственной Думы Федерального Собрания Российской Федерации на основе взаимности вводятся персональные ограничения в отношении 287 членов Палаты общин британского парламента.

      Указанные лица, которым отныне закрыт въезд в Российскую Федерацию, принимали наиболее активное участие в учреждении антироссийских санкционных инструментов Лондона, способствуют безосновательному нагнетанию русофобской истерии в Великобритании.

      Враждебная риторика и надуманные обвинения, звучащие из уст британских парламентариев, не только потворствуют враждебному курсу Лондона, нацеленному на демонизацию нашей страны и ее международную изоляцию, но и используются противниками взаимоуважительного диалога с Россией для подрыва фундамента двустороннего сотрудничества.
      Члены фракции Консервативной партии в Палате общин Парламента Великобритании

      Стивен Пол БАРКЛИ (Stephen Paul BARCLAY),
      Дэвид Майкл ДЭВИС (David Michael DAVIS),
      Чарльз Джордж ЮСТИС (Charles George EUSTICE),
      Доминик Чарльз ГРИВ (Dominic Charles GRIEVE),
      Кристофер ХИТОН-ХАРРИС (Christopher HEATON-HARRIS),
      Джереми Ричард Стреншам ХАНТ (Jeremy Richard Streynsham HUNT),
       Алистер Уильям Джек (Alister William JACK),
       Даниэль Роберт КАВЧИНСКИЙ (Daniel Robert KAWCZYNSKI),
       Андреа Жаклин ЛЕДСОМ (Andrea Jacqueline LEADSOM),
       Джулиан Мюррей ЛЬЮИС (Julian Murray LEWIS),
       Эстер Луиза МАКВЕЙ (Esther Louise MCVEY),
       Пенелопа Мери МОРДОНТ (Penelope Mary MORDAUNT),
       Кэролайн Фиона Эллен НОУКС (Caroline Fiona Ellen NOKES),
      Кристофер Джон ПИНЧЕР (Christopher John PINCHER),
       Джейкоб Уильям РИС-МОГГ (Jacob William REES-MOGG),
       Марк Стивен СПЕНСЕР (Mark Steven SPENCER),
      Тереза Энн ВИЛЬЕРС (Theresa Ann VILLIERS),
       Хизер Кей УИЛЛЕР (Heather Kay WHEELER),

      <list>
    en: ''
