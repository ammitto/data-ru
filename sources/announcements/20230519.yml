announcement:
  title:
    ru: Заявление МИД России в связи с введением персональных санкций в отношении граждан США
    en: Foreign Ministry statement on new personal sanctions on US citizens
  url: https://mid.ru/ru/foreign_policy/news/1871495/
  lang: ru
  publish_date: '2023-05-19'
  publish_time: '19:21'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 976-19-05-2023
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на регулярно вводимые администрацией Дж.Байдена антироссийские санкции, которые призваны, по замыслу Вашингтона, нанести России максимальный ущерб, персонально затронув официальных лиц и простых граждан нашей страны, в порядке контрмер закрывается въезд в Российскую Федерацию для 500 американцев.

      В их числе – не только «знаковые» фигуры, включая бывшего президента США Б.Обаму, но и действующие руководители различных уровней исполнительной власти, экс-чиновники вроде куратора Белого дома по борьбе с «российской дезинформацией» Н.Янкович, впервые избранные на ноябрьских выборах-2022 сенаторы и конгрессмены, эксперты и сотрудники «аналитических» центров, причастные к распространению русофобских установок и фейков, а также главы компаний ВПК, поставляющих вооружения режиму в Киеве. В прилагаемый «список-500» внесены и те во властных и правоохранительных структурах, кто непосредственно причастен к преследованиям инакомыслящих по следам т.н. «штурма Капитолия».

      Вашингтону пора давно усвоить, что ни один враждебный выпад против России не останется без жесткой реакции. Принцип неотвратимости наказания будет последовательно применяться, идет ли речь об ужесточении санкционного прессинга или дискриминационных шагах с целью воспрепятствовать профессиональной деятельности наших сограждан.

      В данной связи подтверждаем, что запрос посольства США в Москве о консульском посещении арестованного за шпионаж репортера Э.Гершковича в очередной раз отклоняется в порядке реагирования на невыдачу виз российским журналистам из пула Министра иностранных дел С.В.Лаврова, в результате чего они не смогли вылететь в Нью-Йорк для сопровождения его визита в рамках председательства России в Совете Безопасности ООН.

      <list>
    en: |
      The Joseph Biden administration regularly imposes personal anti-Russia sanctions on Russian officials and ordinary citizens to create as much hardship for Russia as possible. In response to these sanctions, Russia is denying entry to 500 Americans.

      These are not just notable people like former US President Barrack Obama but also the current heads of various levels of executive government and ex-officials like the White House curator on countering “Russian disinformation” Nina Jankowicz, senators and congresspeople elected for the first time in November 2022, experts and the staff of analytical centres involved in spreading Russophobic ideas and fake stories, and the heads of military-industrial companies supplying weapons to the Kiev regime. The attached list of 500 names also includes officials at government and law-enforcement agencies that are directly involved in harassing dissidents after “the storm of the Capitol.”

      It is time for Washington to realise that not a single hostile move against Russia will remain without a tough response. We will consistently apply the principle of inevitable punishment, be it in response to the toughening of sanctions or discrimination to obstruct the professional activity of our citizens.

      In this context, we can confirm that another request from the US Embassy in Moscow for a consular visit with reporter Evan Gershkovich, arrested for espionage, is denied again in response to the non-issuance of visas to Russian journalists from Foreign Minister Sergey Lavrov’s press pool. Due to this, they could not fly to New York to support his visit in the context of Russia’s Presidency of the UN Security Council. Below is the list of names permanently added to the stop list:

