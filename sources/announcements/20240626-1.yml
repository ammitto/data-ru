# yaml-language-server: $schema=../../schemas/announcement-schema.yml
---
announcement:
  title:
    ru: Заявление МИД России о персональных санкциях в отношении антироссийски настроенных граждан Новой Зеландии
    en: >-
      Foreign Ministry statement on introducing personal sanctions against citizens of New Zealand sharing anti-Russia sentiments
  url: https://www.mid.ru/ru/foreign_policy/news/1959715/
  lang: ru
  publish_date: '2024-06-26'
  publish_time: '21:07'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 1225-26-06-2024
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на политически мотивированные санкции против российских физических и юридических лиц со стороны правительства Новой Зеландии, вводимые в рамках русофобской кампании «коллективного Запада», въезд в нашу страну на бессрочной основе закрывается дополнительно для 36 новозеландцев из числа политических деятелей, руководителей силовых структур, преподавателей высших учебных заведений, журналистов и общественных деятелей, формирующих в этой стране антироссийскую повестку дня (ниже следует поименный перечень).

      С учетом того, что официальный Веллингтон не намерен отказываться от антироссийского курса и продолжает принимать новые санкционные меры, работа над актуализацией российского «стоп-листа» будет продолжена.

      <list>
    en: |
      In response to the politically motivated sanctions against Russian individuals and legal entities, introduced by the Government of New Zealand as part of the collective West’s Russophobic campaign, entry to the Russian Federation shall be additionally closed in perpetuity to 36 New Zealand citizens, including politicians, heads of security agencies, university teachers, journalists and public figures shaping an anti-Russia agenda in that country (following below is a list of names).

      Considering that Wellington does not intend to renounce its anti-Russia policy and continues to approve new sanctions, the work to update the Russian stop list will be continued.

      №

      Name, Family name

      Place of employment / Position

      <list>
