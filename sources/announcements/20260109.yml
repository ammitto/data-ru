announcement:
  title:
    ru: Заявление МИД России о введении персональных контрсанкций в отношении ряда граждан Канады
    en: Foreign Ministry Statement on retaliatory personal sanctions against a number of Canadian citizens
  url: https://mid.ru/en/foreign_policy/news/2071436/
  lang: ru
  publish_date: '2026-01-05'
  publish_time: '17:52'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 9-05-01-2026
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
    В ответ на объявлявшиеся ранее официальной Оттавой неправомерные
    антироссийские ограничения въезд в Россию закрывается на постоянной основе
    для 28 канадских граждан, деятельность которых в структурах и организациях
    пробандеровского толка направлена на продвижение преступной неонацистской
    идеологии, ныне проповедуемой киевским режимом.

    Данные лица, игнорируя исторические факты и правду о событиях Великой
    Отечественной войны, силятся упрочить связку Канады с наиболее радикальными
    и непримиримыми националистическими силами на Украине. Дополнительным
    подтверждением этой тенденции стало сегодняшнее назначение бывшей министра
    иностранных дел и вице-премьера Канады Христи Фриланд, внучки гитлеровского
    приспешника Михайло Хомяка, на должность советника В.Зеленского по вопросам
    экономического развития «Незалежной». Киевская клика, отдавая дань оголтелой
    укронацистской общине Канады, пошла на это кадровое решение, обеляя тем
    самым преступления украинских нацистов из 14-й дивизии СС «Галичина»,
    подразделений Шуцманшафт СС, «Нахтигаль» и других.

    Россия последовательно выступает против любых проявлений экстремизма и
    ксенофобии, и будет продолжать принимать меры по защите своих
    государственных интересов и исторической правды.

    Ниже следует поименный перечень лиц, пополнивших российский «стоп-лист»:
    en: |
    In response to the unlawful anti-Russian restrictions previously imposed by
    official Ottawa, entry into the Russian Federation is permanently barred to
    28 Canadian citizens whose activities within organisations and structures of
    a pro-Bandera orientation are aimed at promoting the criminal neo-Nazi
    ideology currently espoused by the Kiev regime.

    By disregarding historical facts and the truth about the events of the Great
    Patriotic War, these individuals seek to further entrench Canada’s alignment
    with the most radical and uncompromising nationalist forces in Ukraine.
    Further confirmation of this trend is provided by today’s appointment of
    former Canadian Minister of Foreign Affairs and Deputy Prime Minister
    Chrystia Freeland, the granddaughter of Hitler’s accomplice Mikhailo
    Khomiak, as an adviser to Vladimir Zelensky on the economic development of
    Independent Ukraine.

    Through this personnel decision, the Kiev clique, in deference to Canada’s
    aggressive Ukrainian neo-Nazi community, has effectively sought to whitewash
    the crimes committed by Ukrainian Nazis from the 14th Waffen Grenadier
    Division of the SS “1st Galician,” the SS Schutzmannschaft (Auxiliary
    Police) units, the Nachtigall Battalion, and other formations.

    Russia consistently opposes all manifestations of extremism and xenophobia
    and will continue to take measures to safeguard its state interests and
    uphold historical truth.

    Below is a list of individuals added to Russia’s stop list.
