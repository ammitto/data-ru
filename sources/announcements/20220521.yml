announcement:
  title:
    ru: Заявление МИД России о введении персональных санкций в отношении ряда граждан Канады
    en: Заявление МИД России о введении персональных санкций в отношении ряда граждан Канады
  url: https://www.mid.ru/ru/maps/ca/1814238/
  lang: ru
  publish_date: '2022-05-21'
  publish_time: '13:45'
  authority: ru/ministry-of-foreign-affairs
  publisher: ru/ministry-of-foreign-affairs
  type: ru/ministry-of-foreign-affairs-announcement
  document_id: 1080-21-05-2022
  signatory: ru/ministry-of-foreign-affairs
  content:
    ru: |
      В ответ на объявленные властями Канады очередные антироссийские санкции, затронувшие не только представителей руководства, военных и деловых кругов, но в ряде случаев ближайших родственников тех, кто стал фигурантом «черного списка», въезд в Россию закрывается на постоянной основе для аналогичной категории канадских граждан.

      Речь идет о высших чиновниках, их родных и близких, топ-менеджерах ВПК и судостроительной отрасли, командовании вооруженных сил. Вслед за обнародованием данного перечня его фигуранты будут внесены в общий список канадских «закрытников», размещенный на сайте МИД:

      <list>
    en: ''
